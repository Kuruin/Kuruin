name: Update README cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs once daily at midnight
  push:
    paths:
      - ".github/workflows/stats.yml" # Run any time this file is modified
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card 
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=date_night
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&langs_count=6&hide_border=false&theme=date_night
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Generate streak stats
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          card: streak
          options: user=${{ github.repository_owner }}&hide_border=true&disable_animations=true&theme=date-night
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}
    

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "README: Update statistics cards" || exit 0
          git push
